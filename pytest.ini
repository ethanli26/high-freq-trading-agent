[pytest]
testpaths = tests
addopts = -q
markers =
    slow: long-running tests (e.g. the full canonical backtest); skipped in CI.
    network: tests that need yfinance/Finnhub data; skipped offline and in CI.
# The pandas FutureWarnings from the existing code are noise for the test output.
filterwarnings =
    ignore::FutureWarning
